updateFrequency: 5m
privateKeyPath: /root/.ssh/id_ed25519
projects:
  - type: shell
    repository: git@github.com:plaffitt/yggops-demo.git
    updateFrequency: 1h
    webhook:
      provider: github
      secret: my_secret
      events:
        - ping
        - push
    options:
      script: |
        install -m 644 yggops.yaml /etc/yggops/config.yaml &&
        install -m 644 gitea.env /etc/yggops/gitea.env &&
        (sleep 1; systemctl restart yggops) &

  - type: docker_compose
    name: gitea-postgres
    repository: git@github.com:docker/awesome-compose.git
    branch: master
    updateFrequency: 1m
    webhook:
      provider: generic
      secret: my_secret
    options:
      env-file: /etc/yggops/gitea.env
      build: false

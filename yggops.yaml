updateFrequency: 5m
privateKeyPath: /root/.ssh/id_ed25519
projects:
  - type: shell
    repository: https://github.com/plaffitt/yggops-demo.git
    updateFrequency: 1h
    webhook:
      provider: github
      secret: my_secret
      events:
        - push
    options:
      script: |
        install -m 644 yggops.yaml /etc/yggops/config.yaml;
        (sleep 1; systemctl restart yggops) &

  - type: docker_compose
    name: gitea-postgres
    repository: https://github.com/ruanbekker/awesome-docker-compose.git
    updateFrequency: 1m
    options:
      env-file: /etc/yggops/gitea.env
      build: false
